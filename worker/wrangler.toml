# Cloudflare Worker config — Personal Organizer: serwuje front (Static Assets) + API + cron (push scheduler).
# database_id jest placeholderem do czasu założenia konta Cloudflare (Faza 4, Blok B).

name = "personal-organizer-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Jeden Worker serwuje zbudowany front (web/dist) ORAZ API — ten sam origin, zero CORS.
# run_worker_first kieruje TYLKO /api/* do Workera; reszta to statyczny front.
# not_found_handling = SPA → react-router dostaje index.html dla nieznanych ścieżek nawigacji.
[assets]
directory = "../web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "personal-organizer"
database_id = "00000000-0000-0000-0000-000000000000" # placeholder — uzupełnić po `wrangler d1 create`

# Budzik: Cron co minutę sprawdza zadania do przypomnienia i wysyła push.
[triggers]
crons = ["* * * * *"]
